      dockerfile: Dockerfile.studio
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?set VITE_API_BASE_URL}
        VITE_ASSET_JOB_RUN_MODE: ${VITE_ASSET_JOB_RUN_MODE:-worker}
